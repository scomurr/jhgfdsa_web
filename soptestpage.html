<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP Test</title>
</head>
<body>
    <h1>SOP Test Page</h1>
    <h2>Same-Origin</h2>
    <div id="sopResult">Loading...</div>
    <h2>Cross-Origin</h2>
    <div id="result">Loading...</div>
    <h2>Hydrohousehold Iframe</h2>
    <div id="hhhResult">Loading...</div>
    <iframe id="hydroIframe" src="https://hydrohousehold.com" width="600" height="400"></iframe>

    <script>
        // Function to fetch JSON and display it in the DOM
        async function fetchData() {
            try {
                const response = await fetch('https://api.jhgfdsa.com/rest/info');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const resultElement = document.getElementById('result');
                resultElement.textContent = JSON.stringify(data, null, 2);
                resultElement.style.backgroundColor = 'lightgreen'; 
            } catch (error) {
                console.error('Error fetching data:', error);
                const resultElement = document.getElementById('result');
                resultElement.textContent = 'Failed to fetch data. Check the console for details.';
                resultElement.style.backgroundColor = 'lightpink'; 
            }
        }

        // Call the function on page load
        fetchData();
    </script>
    <script>
        // Function to fetch JSON and display it in the DOM
        async function fetchData() {
            try {
                const response = await fetch('https://jhgfdsa.com/api/rest/info');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const sopResultElement = document.getElementById('sopResult');
                sopResultElement.textContent = JSON.stringify(data, null, 2);
                sopResultElement.style.backgroundColor = 'lightgreen';
            } catch (error) {
                console.error('Error fetching data:', error);
                const sopResultElement = document.getElementById('sopResult');
                sopResultElement.textContent = 'Failed to fetch data. Check the console for details.';
                sopResultElement.style.backgroundColor = 'lightpink';
            }
        }

        // Call the function on page load
        fetchData();
    </script>
    <script>
        const iframe = document.getElementById('hydroIframe');
        try {
            const iframeContent = iframe.contentDocument.body.innerHTML;
            const hhhResultElement = document.getElementById('hhhResult');
            hhhResultElement.textContent = iframeContent;
            hhhResultElement.style.backgroundColor = 'lightgreen';
        } catch (error) {
            console.error('Error accessing iframe content:', error);
        }
    </script>
</body>
</html>
